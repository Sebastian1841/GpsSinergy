<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sinergy Group - loader corregido</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: transparent;
    }

    .sinergy-loader {
      display: inline-block;
      width: 500px;
      max-width: 100%;
      line-height: 0;
      contain: layout paint;
    }

    .sinergy-loader svg {
      display: block;
      width: 100%;
      height: auto;
      overflow: visible;
      shape-rendering: geometricPrecision;
      text-rendering: geometricPrecision;
      transform: translateZ(0);
      backface-visibility: hidden;
    }

    .rings {
      opacity: 1;
      animation: ringsFade 2.45s ease forwards;
    }

    .ring {
      transform-box: fill-box;
      transform-origin: center center;
      opacity: 0;
      animation-fill-mode: forwards;
      backface-visibility: hidden;
    }

    .ring--one {
      animation: ringOne 2.45s cubic-bezier(.22,.78,.18,1) forwards;
    }

    .ring--two {
      animation: ringTwo 2.45s cubic-bezier(.22,.78,.18,1) forwards;
    }

    .ring--three {
      animation: ringThree 2.45s cubic-bezier(.22,.78,.18,1) forwards;
    }

    .mark-final {
      transform-box: fill-box;
      transform-origin: center center;
      animation: markFinalReveal 2.45s ease forwards;
      opacity: 0;
      backface-visibility: hidden;
    }

    .wordmark {
      transform-box: fill-box;
      transform-origin: left center;
      animation: wordmarkReveal 2.45s ease forwards;
      opacity: 0;
      filter: brightness(0) invert(1) contrast(1.05);
      backface-visibility: hidden;
    }

    @keyframes ringOne {
      0%, 12% {
        opacity: 0;
        transform: translate3d(0, 18px, 0);
      }
      24% {
        opacity: 1;
      }
      52%, 100% {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }
    }

    @keyframes ringTwo {
      0%, 18% {
        opacity: 0;
        transform: translate3d(0, 0, 0);
      }
      30% {
        opacity: 1;
      }
      54%, 100% {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }
    }

    @keyframes ringThree {
      0%, 24% {
        opacity: 0;
        transform: translate3d(0, -18px, 0);
      }
      36% {
        opacity: 1;
      }
      56%, 100% {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }
    }

    @keyframes ringsFade {
      0%, 56% {
        opacity: 1;
      }
      68%, 100% {
        opacity: 0;
      }
    }

    @keyframes markFinalReveal {
      0%, 58% {
        opacity: 0;
      }
      70%, 100% {
        opacity: 1;
      }
    }

    @keyframes wordmarkReveal {
      0%, 62% {
        opacity: 0;
        transform: translate3d(14px, 0, 0);
      }
      78%, 100% {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .rings,
      .ring {
        animation: none;
        opacity: 0;
        transform: none;
      }

      .mark-final,
      .wordmark {
        animation: none;
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>
